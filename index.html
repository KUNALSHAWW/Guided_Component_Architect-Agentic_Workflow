<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guided Component Architect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --secondary: #ec4899;
      --accent: #14b8a6;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --radius: 8px;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--surface-2);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .badge {
      font-size: 11px;
      background: var(--surface-2);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 500;
    }

    /* ── MAIN LAYOUT ── */
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--surface-2);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--surface-2);
      flex-shrink: 0;
    }

    /* ── CHAT LOG ── */
    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 2px;
    }

    .msg.agent {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-bottom-left-radius: 2px;
    }

    .msg.log {
      align-self: flex-start;
      font-size: 12px;
      font-family: var(--mono);
      padding: 6px 10px;
      border-radius: 4px;
    }

    .msg.log.info    { background: rgba(99,102,241,0.1); color: #818cf8; }
    .msg.log.success { background: rgba(20,184,166,0.15); color: #5eead4; }
    .msg.log.fail    { background: rgba(236,72,153,0.1); color: #f472b6; }
    .msg.log.error   { background: rgba(239,68,68,0.15); color: #fca5a5; }

    /* ── INPUT BAR ── */
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--surface-2);
      flex-shrink: 0;
    }

    .input-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--surface-2);
      color: var(--text);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-bar input:focus {
      border-color: var(--primary);
    }

    .input-bar input::placeholder { color: var(--muted); }

    .input-bar button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-bar button:hover { background: #4f46e5; }
    .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: var(--surface-2) !important;
      color: var(--muted) !important;
      font-weight: 500 !important;
      font-size: 12px !important;
      padding: 10px 14px !important;
    }

    .btn-secondary:hover { background: var(--surface) !important; color: var(--text) !important; }

    /* ── RIGHT PANEL (CODE) ── */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .code-output {
      flex: 1;
      overflow: auto;
      padding: 16px 20px;
      background: var(--bg);
    }

    .code-output pre {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .code-output .placeholder {
      color: var(--muted);
      font-family: var(--font);
      font-size: 14px;
      text-align: center;
      margin-top: 40%;
    }

    .code-toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      background: var(--surface);
      border-top: 1px solid var(--surface-2);
      flex-shrink: 0;
    }

    .code-toolbar button {
      background: var(--surface-2);
      border: none;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .code-toolbar button:hover { background: var(--primary); color: white; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border-top: 1px solid var(--surface-2);
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .status-dot.loading {
      animation: pulse 1s infinite;
      background: var(--secondary);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <h1>Guided Component Architect</h1>
    <span class="badge">Groq + LLaMA 3.3-70B</span>
  </header>

  <div class="container">
    <!-- LEFT: Chat -->
    <div class="panel-left">
      <div class="panel-header">Agent Chat</div>
      <div class="chat-log" id="chatLog">
        <div class="msg agent">
          Describe an Angular + Tailwind component. I'll generate, validate against the design system, and self-correct if needed.
        </div>
      </div>
      <div class="input-bar">
        <input type="text" id="promptInput" placeholder="e.g. A login card with glassmorphism..." autofocus />
        <button id="sendBtn" onclick="sendPrompt()">Generate</button>
        <button class="btn-secondary" onclick="resetChat()">Reset</button>
      </div>
    </div>

    <!-- RIGHT: Code Output -->
    <div class="panel-right">
      <div class="panel-header">Generated Component</div>
      <div class="code-output" id="codeOutput">
        <div class="placeholder">Your component code will appear here</div>
      </div>
      <div class="code-toolbar">
        <button onclick="copyCode()">Copy Code</button>
        <button onclick="downloadCode()">Download .ts</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>

  <script>
    let chatHistory = [];
    let lastCode = "";

    const chatLog   = document.getElementById("chatLog");
    const input     = document.getElementById("promptInput");
    const sendBtn   = document.getElementById("sendBtn");
    const codeOut   = document.getElementById("codeOutput");
    const statusDot = document.getElementById("statusDot");
    const statusTxt = document.getElementById("statusText");

    // Enter key to send
    input.addEventListener("keydown", e => { if (e.key === "Enter" && !sendBtn.disabled) sendPrompt(); });

    function addMsg(text, cls) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function setStatus(text, loading = false) {
      statusTxt.textContent = text;
      statusDot.className = loading ? "status-dot loading" : "status-dot";
    }

    async function sendPrompt() {
      const prompt = input.value.trim();
      if (!prompt) return;

      addMsg(prompt, "user");
      input.value = "";
      sendBtn.disabled = true;
      setStatus("Generating...", true);

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, history: chatHistory }),
        });

        const data = await res.json();

        if (data.error) {
          addMsg(`Error: ${data.error}`, "log error");
          setStatus("Error");
          sendBtn.disabled = false;
          return;
        }

        // Show logs
        if (data.logs) {
          data.logs.forEach(log => addMsg(log.text, `log ${log.type}`));
        }

        // Update history
        if (data.history) chatHistory = data.history;

        // Show code
        if (data.code) {
          lastCode = data.code;
          codeOut.innerHTML = `<pre>${escapeHtml(data.code)}</pre>`;

          const status = data.valid
            ? `Validated in ${data.attempts} attempt(s)`
            : `Failed after ${data.attempts} attempts`;
          addMsg(status, data.valid ? "log success" : "log fail");
        }

        setStatus(data.valid ? "Component ready" : "Validation failed");
      } catch (err) {
        addMsg(`Network error: ${err.message}`, "log error");
        setStatus("Error");
      }

      sendBtn.disabled = false;
    }

    function resetChat() {
      chatHistory = [];
      lastCode = "";
      chatLog.innerHTML = `<div class="msg agent">Chat history cleared. Describe a new component.</div>`;
      codeOut.innerHTML = `<div class="placeholder">Your component code will appear here</div>`;
      setStatus("Ready");
    }

    function copyCode() {
      if (!lastCode) return;
      navigator.clipboard.writeText(lastCode).then(() => setStatus("Copied to clipboard!"));
    }

    function downloadCode() {
      if (!lastCode) return;
      const blob = new Blob([lastCode], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "component.ts";
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus("Downloaded component.ts");
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>

</body>
</html>
